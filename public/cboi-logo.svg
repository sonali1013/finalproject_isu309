  <rect x="20" y="24" width="152" height="112" rx="2" fill="#ffffff"/>
  <rect x="26" y="30" width="140" height="100" rx="2" fill="#ffffff" stroke="#0A76C8" stroke-width="3"/>

  <g transform="translate(96 80)">
